<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PURE — Simple · Real · Transparent</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0C0C0A;
  --black-mid:#141412;
  --black-lift:#1E1E1C;
  --black-border:#282826;
  --black-border-light:#323230;
  --cream:#F3EDE3;
  --cream-mid:#EAE3D8;
  --cream-dark:#C8C1B3;
  --cream-mute:#8A8479;
  --ink:#1A1A18;
  --danger:#8B2222;
  --danger-bg:#190D0D;
  --danger-bdr:#2C1414;
  --warn:#946A18;
  --warn-bg:#191208;
  --warn-bdr:#2C1E0A;
  --safe:#336648;
  --safe-bg:#0B1710;
  --safe-bdr:#162C1E;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}

.shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:var(--black);border-right:1px solid var(--black-border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo-block{padding:2.75rem 2rem 2.25rem;border-bottom:1px solid var(--black-border);text-align:center}
.logo-word{font-family:'Outfit',sans-serif;font-size:22px;font-weight:200;letter-spacing:0.55em;padding-left:0.55em;color:var(--cream);line-height:1}
.logo-divider{width:28px;height:0.5px;background:var(--black-border-light);margin:10px auto}
.logo-tagline{font-size:15px;font-weight:300;letter-spacing:0.32em;text-transform:uppercase;color:var(--cream-mute)}

.nav{flex:1;padding:1.25rem 0}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;padding:12px 2rem;font-family:'Outfit',sans-serif;font-size:14px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:var(--cream-mute);background:none;border:none;cursor:pointer;border-left:1px solid transparent;transition:all 0.2s;text-align:left}
.nav-item:hover{color:var(--cream-dark);background:var(--black-mid)}
.nav-item.active{color:var(--cream);border-left-color:var(--cream);background:var(--black-mid)}
.nav-pip{width:3px;height:3px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:0.6}

.pillars-mini{padding:1.5rem 2rem;border-bottom:1px solid var(--black-border)}
.pm-title{font-size:15px;font-weight:300;letter-spacing:0.38em;text-transform:uppercase;color:var(--black-border-light);margin-bottom:10px}
.pm-row{display:flex;align-items:baseline;gap:7px;margin-bottom:5px}
.pm-num{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--black-border-light);flex-shrink:0;min-width:14px}
.pm-txt{font-size:14px;font-weight:300;letter-spacing:0.12em;text-transform:uppercase;color:var(--cream-mute);opacity:0.5;line-height:1.3}

.founders{padding:1.25rem 2rem;border-bottom:1px solid var(--black-border)}
.founder-label{font-size:15px;letter-spacing:0.35em;text-transform:uppercase;color:var(--black-border-light);margin-bottom:10px}
.founder-row{margin-bottom:10px}
.founder-name{font-size:10.5px;font-weight:400;letter-spacing:0.12em;color:var(--cream-dark);margin-bottom:2px}
.founder-role{font-size:14px;font-weight:300;letter-spacing:0.1em;color:var(--cream-mute);opacity:0.5;margin-bottom:5px}
.founder-handle{font-size:14px;font-weight:300;letter-spacing:0.1em;color:var(--cream-mute);text-decoration:none;padding:3px 9px;border:0.5px solid var(--black-border-light);display:inline-block;transition:all 0.2s}
.founder-handle:hover{border-color:var(--cream-mute);color:var(--cream-dark)}

.social-block{padding:1.25rem 2rem}
.social-label{font-size:15px;letter-spacing:0.35em;text-transform:uppercase;color:var(--black-border-light);margin-bottom:10px}
.social-links{display:flex;flex-direction:column;gap:5px}
.soc-link{display:flex;align-items:center;gap:8px;padding:7px 10px;border:0.5px solid var(--black-border-light);text-decoration:none;transition:all 0.2s;cursor:pointer;background:none;width:100%;text-align:left}
.soc-link:hover{border-color:var(--cream-mute);background:var(--black-mid)}
.soc-platform{font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:var(--cream-mute);flex-shrink:0;min-width:40px}
.soc-handle{font-size:14px;font-weight:300;color:var(--black-border-light)}
.soc-dot{width:4px;height:4px;border-radius:50%;background:var(--safe);flex-shrink:0;animation:glow 2.5s infinite;margin-left:auto}
@keyframes glow{0%,100%{opacity:1}50%{opacity:0.15}}

/* MAIN */
.main{min-height:100vh}
.page{display:none}
.page.active{display:block}

/* SCANNER */
.scanner-layout{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.scan-left{padding:3.5rem 3rem;background:var(--cream);border-right:1px solid var(--cream-dark);display:flex;flex-direction:column}
.scan-right{padding:3.5rem 3rem;background:var(--black);overflow-y:auto}

.pg-eyebrow{font-size:14px;font-weight:300;letter-spacing:0.4em;text-transform:uppercase;color:var(--cream-mute);margin-bottom:10px}
.pg-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:200;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink);line-height:1.1;margin-bottom:4px}
.pg-title em{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;letter-spacing:0.05em;text-transform:none;font-weight:300}
.pg-sub{font-size:14px;font-weight:300;letter-spacing:0.1em;color:var(--cream-mute);margin-bottom:2.5rem}

.pc-header{background:var(--black);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.pc-header-txt{font-size:14px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;color:var(--cream-mute)}
.pc-header-num{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--cream-dark)}
.pc-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-top:0.5px solid var(--cream-dark)}
.pc-num{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--cream-mute);flex-shrink:0;min-width:16px}
.pc-name{font-size:14px;font-weight:300;letter-spacing:0.14em;text-transform:uppercase;color:var(--cream-mute);flex:1}
.pc-tags{font-size:14px;font-weight:300;color:var(--cream-dark);opacity:0.6;text-align:right}

.mode-tabs{display:flex;border:0.5px solid var(--cream-dark);margin-bottom:1.5rem}
.mode-tab{flex:1;padding:10px 0;font-family:'Outfit',sans-serif;font-size:14px;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;border:none;background:none;cursor:pointer;color:var(--cream-mute);transition:all 0.2s}
.mode-tab:not(:last-child){border-right:0.5px solid var(--cream-dark)}
.mode-tab.active{background:var(--black);color:var(--cream)}
.mode-tab:hover:not(.active){background:var(--cream-mid);color:var(--ink)}

.field-lbl{font-size:14px;font-weight:300;letter-spacing:0.32em;text-transform:uppercase;color:var(--cream-mute);display:block;margin-bottom:9px}
textarea{width:100%;background:var(--cream-mid);border:0.5px solid var(--cream-dark);color:var(--ink);font-family:'Outfit',sans-serif;font-size:14px;font-weight:300;padding:14px;resize:vertical;min-height:120px;outline:none;line-height:1.7;transition:border-color 0.2s;letter-spacing:0.02em}
textarea:focus{border-color:var(--black)}
textarea::placeholder{color:var(--cream-mute);opacity:0.5}
input[type=text]{width:100%;background:var(--cream-mid);border:0.5px solid var(--cream-dark);color:var(--ink);font-family:'Outfit',sans-serif;font-size:14px;font-weight:300;padding:12px 14px;outline:none;transition:border-color 0.2s;letter-spacing:0.02em}
input[type=text]:focus{border-color:var(--black)}
input[type=text]::placeholder{color:var(--cream-mute);opacity:0.5}

/* PHOTO UPLOAD */
.upload-zone{background:var(--cream-mid);border:0.5px dashed var(--cream-dark);padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.upload-zone:hover{border-color:var(--black);background:var(--cream)}
.upload-zone.drag-over{border-color:var(--black);background:var(--cream);border-style:solid}
.upload-ico-lbl{font-size:15px;letter-spacing:0.28em;text-transform:uppercase;color:var(--cream-dark);margin-bottom:6px}
.upload-sub{font-size:14px;letter-spacing:0.16em;text-transform:uppercase;color:var(--cream-mute);opacity:0.45}
#file-input{display:none}
.preview-wrap{margin-top:14px;position:relative;display:none}
#preview-img{max-width:100%;max-height:220px;display:block;margin:0 auto;border:0.5px solid var(--cream-dark)}
.preview-clear{
  position:absolute;top:6px;right:6px;
  background:var(--black);color:var(--cream);border:none;
  font-size:14px;padding:4px 8px;cursor:pointer;
  font-family:'Outfit',sans-serif;letter-spacing:0.1em;
}
.upload-hint{font-size:15px;font-weight:300;color:var(--cream-mute);margin-top:10px;line-height:1.6;padding:8px;background:var(--cream-mid);border:0.5px solid var(--cream-dark)}

.error-box{background:#190D0D;border:0.5px solid var(--danger-bdr);padding:10px 14px;margin-top:10px;display:none}
.error-box.show{display:block}
.error-txt{font-size:15px;font-weight:300;color:#CC8080;letter-spacing:0.02em}

.scan-btn-wrap{margin-top:auto;padding-top:1.5rem}
.scan-btn{width:100%;padding:15px;background:var(--black);color:var(--cream);border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:14px;font-weight:300;letter-spacing:0.44em;text-transform:uppercase;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;gap:12px}
.scan-btn:hover:not(:disabled){opacity:0.72}
.scan-btn:disabled{opacity:0.25;cursor:not-allowed}

/* RESULT PANEL */
.result-empty{display:flex;flex-direction:column;justify-content:center;min-height:80vh}
.empty-eyebrow{font-size:14px;letter-spacing:0.38em;text-transform:uppercase;color:var(--black-border-light);margin-bottom:1.25rem}
.empty-headline{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;font-style:italic;color:var(--black-lift);line-height:1.2;margin-bottom:2.5rem}
.empty-pillars-title{font-size:15px;letter-spacing:0.38em;text-transform:uppercase;color:var(--black-border);margin-bottom:10px}
.ep-row{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--black-border)}
.ep-num{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--black-border-light);flex-shrink:0;min-width:16px}
.ep-name{font-size:14px;letter-spacing:0.22em;text-transform:uppercase;color:var(--black-lift)}
.ep-tags{font-size:10.5px;font-weight:300;letter-spacing:0.06em;color:var(--black-border);margin-left:auto;text-align:right;font-style:italic;font-family:'Cormorant Garamond',serif}

.loading-panel{display:none;padding:2rem 0}
.loading-panel.show{display:block}
.spin{width:20px;height:20px;border:0.5px solid var(--black-border-light);border-top-color:var(--cream-mute);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1.25rem}
@keyframes spin{to{transform:rotate(360deg)}}
.load-lbl{font-size:14px;letter-spacing:0.32em;text-transform:uppercase;color:var(--cream-mute)}
.load-sub{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--black-lift);margin-top:6px}
.load-step{font-size:15px;font-weight:300;color:var(--black-border-light);margin-top:10px;min-height:16px;transition:all 0.3s}

#results{display:none}
#results.show{display:block}

.res-head{margin-bottom:1.75rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--black-lift)}
.res-product{font-size:14px;font-weight:300;letter-spacing:0.3em;text-transform:uppercase;color:var(--cream-mute);margin-bottom:8px}
.res-score-row{display:flex;align-items:baseline;gap:10px;margin-bottom:1rem}
.res-big{font-family:'Cormorant Garamond',serif;font-size:58px;font-weight:300;line-height:1}
.res-denom{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:var(--black-border-light)}
.res-verdict{font-size:14px;font-weight:300;letter-spacing:0.32em;text-transform:uppercase}
.res-summary{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;font-style:italic;color:var(--cream-dark);line-height:1.8;border-left:0.5px solid var(--black-border-light);padding-left:1.25rem}

.pillar-verdicts{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:1.25rem}
.pv-item{padding:9px 12px;border:0.5px solid;display:flex;align-items:center;gap:8px}
.pv-item.pass{background:var(--safe-bg);border-color:var(--safe-bdr)}
.pv-item.fail{background:var(--danger-bg);border-color:var(--danger-bdr)}
.pv-item.warn{background:var(--warn-bg);border-color:var(--warn-bdr)}
.pv-mark{font-size:15px;flex-shrink:0;font-weight:400}
.pv-item.pass .pv-mark{color:var(--safe)}
.pv-item.fail .pv-mark{color:var(--danger)}
.pv-item.warn .pv-mark{color:var(--warn)}
.pv-text{font-size:14px;font-weight:300;letter-spacing:0.1em;line-height:1.4}
.pv-item.pass .pv-text{color:#5AAB72}
.pv-item.fail .pv-text{color:#CC7070}
.pv-item.warn .pv-text{color:#C8922A}
